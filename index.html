<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jason - vagner.net</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📟</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffb000;
            font-family: 'VT323', 'Courier New', Courier, monospace;
            font-size: 20px;
            line-height: 1.4;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .terminal {
            max-width: 800px;
            margin: 0 auto;
        }

        .header pre {
            font-family: 'Courier New', Courier, monospace !important;
            margin: 0;
            line-height: 1.25;
            white-space: pre;
            font-size: 14px;
            letter-spacing: 0;
        }

        .user-info {
            white-space: pre;
        }

        .user-info {
            white-space: pre;
        }

        .post {
            margin-top: 15px;
        }

        .post-header {
            white-space: pre;
        }

        .post-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 5px;
            padding-left: 10px;
        }

        .post-time {
            color: #ffb000;
        }

        .cursor {
            display: inline-block;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        a {
            color: #ffb000;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: #ffcc00;
        }

        ::selection {
            background: #ffb000;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="terminal" id="output"></div>

    <script>
        const output = document.getElementById('output');
        const USERNAME = 'jvagner.bsky.social';

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                           'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const day = date.getDate().toString().padStart(2, ' ');
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const mins = date.getMinutes().toString().padStart(2, '0');
            return { date: `${month} ${day} ${year}`, time: `${hours}:${mins}` };
        }

        async function fetchBlueskyPosts() {
            try {
                const response = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=${USERNAME}&limit=10`);
                const data = await response.json();
                return data.feed || [];
            } catch (e) {
                console.error('Failed to fetch Bluesky posts:', e);
                return [];
            }
        }

        async function main() {
            const header = document.createElement('div');
            header.className = 'header';
            header.innerHTML = `<pre>################################################################################
#                                                                              #
#    J   J   AAA   SSS   OOO   NNNN                                           #
#    J   J  A   A   S   O   O  N   N                                          #
#    J   J  AAAAA   S   O   O  NNNN                                           #
#    J   J  A   A   S   O   O  N   N                                          #
#    J   J  A   A  SSS   OOO   N   N                                          #
#                                                                              #
################################################################################</pre>`;
            output.appendChild(header);

            const userInfo = document.createElement('div');
            userInfo.className = 'user-info';
            userInfo.innerHTML = `Login name: jason                  Directory: /home/jason
Shell: /bin/bash

No mail.

Project: vagner.net

.plan:

`;
            output.appendChild(userInfo);

            const posts = await fetchBlueskyPosts();
            
            if (posts.length === 0) {
                const error = document.createElement('div');
                error.textContent = '[ Failed to fetch posts from Bluesky ]';
                output.appendChild(error);
            } else {
                posts.forEach(post => {
                    const author = post.post.author;
                    const record = post.post.record;
                    const { date, time } = formatDate(record.createdAt);
                    const postUri = post.post.uri;
                    const rkey = postUri.split('/').pop();
                    const postUrl = `https://bsky.app/profile/${author.handle}/post/${rkey}`;
                    
                    let postContent = record.text ? escapeHtml(record.text) : '';
                    
                    if (record.embed && record.embed.$type === 'app.bsky.embed.images') {
                        const imgCount = record.embed.images.length;
                        postContent += (postContent ? '\n\n' : '') + '  [' + imgCount + ' image' + (imgCount > 1 ? 's' : '') + ' attached]';
                    }

                    const postDiv = document.createElement('div');
                    postDiv.className = 'post';
                    postDiv.innerHTML = `<div class="post-header">------------------------------------------------------------
${date}  <a href="${postUrl}" target="_blank" rel="noopener" class="post-time">${time}</a> - ${author.displayName || author.handle}
</div>
<div class="post-content">${postContent}</div>`;
                    output.appendChild(postDiv);
                });
            }

            const footer = document.createElement('div');
            footer.className = 'user-info';
            footer.innerHTML = `
--------
Last login: ${new Date().toString()} from bsky

jason@bluesky:~$ <span class="cursor">█</span>`;
            output.appendChild(footer);
        }

        main();
    </script>
</body>
</html>
